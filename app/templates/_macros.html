{% macro bloco_banco(prefix, titular_label) %}
  <div class="bank-combobox" data-bank-combobox>
    <div data-bank-search-wrap>
      <label>Banco <span class="opt">(digite o código ou o nome e selecione)</span>
        <input type="text" class="bank-search-input" autocomplete="off" placeholder="Ex.: 001 ou Banco do Brasil" data-bank-search>
      </label>
      <ul class="bank-dropdown hidden" data-bank-dropdown></ul>
    </div>
    <div class="grid-2 hidden" data-bank-manual-wrap>
      <label>Banco — Nº
        <input type="text" name="{{ prefix }}.banco_num" placeholder="Ex.: 001" data-bank-num>
      </label>
      <label>Banco — Nome
        <input type="text" name="{{ prefix }}.banco_nome" placeholder="Ex.: Banco do Brasil S.A." data-bank-nome>
      </label>
    </div>
    <button type="button" class="link-btn" data-bank-toggle>Meu banco não está na lista — preencher manualmente</button>
  </div>
  <div class="grid-2">
    <label>Agência
      <input type="text" name="{{ prefix }}.agencia">
    </label>
    <label>Conta
      <input type="text" name="{{ prefix }}.conta">
    </label>
  </div>
  <p class="hint">Titular da conta: {{ titular_label }}, informado(a) acima — o próprio formulário do BB veda crédito a terceiros, então não é pedido de novo aqui.</p>

  <div class="radio-row">
    <label class="radio-option"><input type="radio" name="{{ prefix }}.tipo_conta" value="corrente"> Conta Corrente</label>
    <label class="radio-option"><input type="radio" name="{{ prefix }}.tipo_conta" value="poupanca"> Poupança</label>
    <label class="inline-field">Variação
      <input type="text" name="{{ prefix }}.poupanca_variacao" size="6">
    </label>
  </div>

  <p class="hint">Valor a resgatar:</p>
  <div class="radio-row">
    <label class="radio-option"><input type="radio" name="{{ prefix }}.valor_opcao" value="total"> Total</label>
    <label class="radio-option"><input type="radio" name="{{ prefix }}.valor_opcao" value="saldo_remanescente"> Saldo Remanescente</label>
    <label class="radio-option"><input type="radio" name="{{ prefix }}.valor_opcao" value="fixo"> Fixo (R$)</label>
    <label class="radio-option"><input type="radio" name="{{ prefix }}.valor_opcao" value="parcial"> Parcial (R$ ou %)</label>
  </div>
  <div class="grid-3">
    <label>Valor fixo (R$)
      <input type="text" name="{{ prefix }}.valor_fixo" placeholder="0,00">
    </label>
    <label>Valor parcial (R$)
      <input type="text" name="{{ prefix }}.valor_parcial" placeholder="0,00">
    </label>
    <label>Percentual (%)
      <input type="text" name="{{ prefix }}.percentual" placeholder="0">
    </label>
  </div>
{% endmacro %}
